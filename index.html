<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres en Línea Multijugador (Supabase)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #facc15;
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
        }
        .tablero {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #2d3a4a;
            padding: 16px;
            border-radius: 1.5rem;
            margin: 10px 0;
        }
        .celda {
            background: #0f172a;
            border-radius: 1rem;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #facc15;
            cursor: pointer;
            transition: 0.1s ease;
            box-shadow: 0 5px 0 #00000033;
        }
        .celda:active {
            transform: scale(0.96);
        }
        .estado {
            text-align: center;
            margin: 15px 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #00000066;
            padding: 8px;
            border-radius: 60px;
            color: #facc15;
        }
        button {
            background: #facc15;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
            color: #0f172a;
            margin: 8px 0;
        }
        button:active {
            transform: scale(0.97);
        }
        .logs-area {
            background: #0a0f1a;
            color: #a5f3c3;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 16px;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #facc1533;
        }
        .log-entry {
            border-bottom: 1px solid #334155;
            padding: 4px 4px;
            word-break: break-word;
        }
        .log-error {
            color: #ffa6a6;
            background: #7f1a1a33;
        }
        .log-success {
            color: #b9ffb9;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ TRES EN LÍNEA</h1>
    <div class="estado" id="estado">🔄 Conectando...</div>
    <div class="tablero" id="tablero"></div>
    <button id="reiniciar">🔄 Reiniciar partida</button>
    <div class="footer">🎮 Tiempo real con Supabase</div>
    
    <!-- Área de logs visible para depuración en móvil -->
    <div class="logs-area" id="logsPanel">
        <div class="log-entry">📡 Iniciando juego...</div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ========= TUS CREDENCIALES (modo pruebas) =========
    const supabaseUrl = 'https://vkylxedxgcxrxfezmaau.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZreWx4ZWR4Z2N4cnhmZXptYWF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mjg1NTcsImV4cCI6MjA5MjEwNDU1N30.QLAB88lwIAwc0IZ2bOwF8cw3QBkcidW9zac7LCvaMiw';
    
    const supabase = createClient(supabaseUrl, supabaseAnonKey);
    const GAME_ID = 1;  // partida fija

    // --- Estado del juego ---
    let miSimbolo = null;       // 'X' o 'O'
    let turnoActual = 'X';
    let juegoTerminado = false;
    let tableroLocal = ["", "", "", "", "", "", "", "", ""];
    
    // --- Elementos DOM ---
    const tableroDiv = document.getElementById("tablero");
    const estadoSpan = document.getElementById("estado");
    const botonReiniciar = document.getElementById("reiniciar");
    const logsPanel = document.getElementById("logsPanel");

    // --- Función para añadir logs visibles ---
    function addLog(mensaje, tipo = "info") {
        const logDiv = document.createElement("div");
        logDiv.classList.add("log-entry");
        if (tipo === "error") logDiv.classList.add("log-error");
        if (tipo === "success") logDiv.classList.add("log-success");
        const timestamp = new Date().toLocaleTimeString();
        logDiv.textContent = `[${timestamp}] ${mensaje}`;
        logsPanel.appendChild(logDiv);
        logsPanel.scrollTop = logsPanel.scrollHeight;
        // También a consola real (por si acaso)
        if (tipo === "error") console.error(mensaje);
        else console.log(mensaje);
    }

    // --- Crear tablero visual ---
    function crearTableroVisual() {
        tableroDiv.innerHTML = "";
        for (let i = 0; i < 9; i++) {
            const celda = document.createElement("div");
            celda.classList.add("celda");
            celda.dataset.index = i;
            celda.addEventListener("click", () => hacerMovimiento(i));
            tableroDiv.appendChild(celda);
        }
        addLog("✅ Tablero visual creado", "success");
    }

    function actualizarVista() {
        const celdas = document.querySelectorAll(".celda");
        for (let i = 0; i < 9; i++) {
            celdas[i].textContent = tableroLocal[i];
        }
    }

    // --- Verificar ganador ---
    function verificarGanador(board) {
        const lineas = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let linea of lineas) {
            const [a,b,c] = linea;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return board[a];
            }
        }
        if (board.every(cell => cell !== "")) return "empate";
        return null;
    }

    // --- Enviar movimiento a Supabase ---
    async function hacerMovimiento(indice) {
        if (juegoTerminado) {
            addLog("⛔ Partida terminada. Reinicia.", "error");
            estadoSpan.textContent = "⛔ Partida terminada";
            return;
        }
        if (miSimbolo !== turnoActual) {
            addLog(`🙅 No es tu turno (tú eres ${miSimbolo}, turno: ${turnoActual})`, "error");
            estadoSpan.textContent = "No es tu turno";
            return;
        }
        if (tableroLocal[indice] !== "") {
            addLog("❌ Casilla ocupada", "error");
            estadoSpan.textContent = "Casilla ocupada";
            return;
        }

        const nuevoTablero = [...tableroLocal];
        nuevoTablero[indice] = miSimbolo;
        const ganador = verificarGanador(nuevoTablero);
        let siguienteTurno = (turnoActual === 'X') ? 'O' : 'X';
        let activo = true;
        if (ganador) {
            siguienteTurno = null;
            activo = false;
            addLog(`🎉 ¡${ganador} ha ganado!`, "success");
        }

        addLog(`📤 Enviando movimiento: ${miSimbolo} en casilla ${indice}`, "info");
        
        const { error } = await supabase
            .from('games')
            .update({
                board: nuevoTablero,
                current_turn: siguienteTurno,
                winner: ganador,
                is_active: activo
            })
            .eq('id', GAME_ID);

        if (error) {
            addLog(`❌ Error al guardar: ${error.message}`, "error");
            estadoSpan.textContent = "Error de red";
        } else {
            addLog(`✅ Movimiento guardado en Supabase`, "success");
            estadoSpan.textContent = "Movimiento enviado";
        }
    }

    // --- Reiniciar partida ---
    async function reiniciarPartida() {
        addLog("♻️ Solicitando reinicio...", "info");
        const tableroVacio = ["", "", "", "", "", "", "", "", ""];
        const { error } = await supabase
            .from('games')
            .update({
                board: tableroVacio,
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,   // Limpiamos asignaciones para que nuevos jugadores tomen rol
                o_player_id: null
            })
            .eq('id', GAME_ID);
        if (error) {
            addLog(`Error al reiniciar: ${error.message}`, "error");
            estadoSpan.textContent = "Error al reiniciar";
        } else {
            addLog(`♻️ Reinicio enviado. Esperando cambios...`, "success");
            estadoSpan.textContent = "Reiniciando...";
        }
    }

    // --- Asignar símbolo (X u O) usando las columnas x_player_id / o_player_id ---
    async function asignarSimbolo() {
        addLog("🔍 Verificando asignación de símbolos...", "info");
        const { data: gameData, error } = await supabase
            .from('games')
            .select('x_player_id, o_player_id')
            .eq('id', GAME_ID)
            .single();
        
        if (error) {
            addLog(`⚠️ Error al leer asignaciones: ${error.message}`, "error");
            return;
        }
        
        const sessionId = Math.random().toString(36).substring(2, 10);
        addLog(`🆔 ID de sesión temporal: ${sessionId}`, "info");
        
        if (!gameData.x_player_id) {
            const { error: updateErr } = await supabase
                .from('games')
                .update({ x_player_id: sessionId })
                .eq('id', GAME_ID);
            if (updateErr) {
                addLog(`Error al tomar X: ${updateErr.message}`, "error");
            } else {
                miSimbolo = 'X';
                addLog(`🎮 Se te ha asignado el símbolo X`, "success");
                estadoSpan.textContent = "Eres X. Esperando oponente...";
            }
        } 
        else if (!gameData.o_player_id) {
            const { error: updateErr } = await supabase
                .from('games')
                .update({ o_player_id: sessionId })
                .eq('id', GAME_ID);
            if (updateErr) {
                addLog(`Error al tomar O: ${updateErr.message}`, "error");
            } else {
                miSimbolo = 'O';
                addLog(`🎮 Se te ha asignado el símbolo O`, "success");
                estadoSpan.textContent = "Eres O. ¡La partida comenzará!";
            }
        } 
        else {
            miSimbolo = null;
            addLog(`👀 Partida llena (X y O ya ocupados). Eres espectador.`, "error");
            estadoSpan.textContent = "Partida llena, solo espectador";
        }
    }

    // --- Sincronización y Realtime ---
    async function iniciarSincronizacion() {
        addLog("🚀 Conectando con Supabase y configurando tiempo real...", "info");
        
        // Asegurar que exista la fila con id=1 (con todas las columnas necesarias)
        const { error: upsertError } = await supabase
            .from('games')
            .upsert({ 
                id: GAME_ID, 
                board: ["","","","","","","","",""],
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,
                o_player_id: null
            }, { onConflict: 'id' });
        if (upsertError) {
            addLog(`⚠️ Upsert inicial: ${upsertError.message}`, "error");
        } else {
            addLog(`📦 Registro de partida asegurado (ID ${GAME_ID})`, "success");
        }
        
        // Asignar símbolo al jugador actual
        await asignarSimbolo();
        
        // Obtener estado actual de la partida
        const { data: currentGame, error: loadError } = await supabase
            .from('games')
            .select('*')
            .eq('id', GAME_ID)
            .single();
        if (loadError) {
            addLog(`❌ Error al cargar partida: ${loadError.message}`, "error");
        } else if (currentGame) {
            tableroLocal = currentGame.board;
            turnoActual = currentGame.current_turn;
            juegoTerminado = !currentGame.is_active;
            actualizarVista();
            addLog(`📥 Estado inicial cargado. Turno: ${turnoActual}, Activo: ${!juegoTerminado}`, "success");
            if (currentGame.winner) addLog(`🏆 Ganador previo: ${currentGame.winner}`, "info");
        }
        
        // Escuchar cambios EN TIEMPO REAL
        const channel = supabase
            .channel('game-channel-logs')
            .on(
                'postgres_changes',
                {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'games',
                    filter: `id=eq.${GAME_ID}`
                },
                (payload) => {
                    addLog(`📡 Cambio detectado en tiempo real`, "success");
                    const newState = payload.new;
                    tableroLocal = newState.board;
                    turnoActual = newState.current_turn;
                    juegoTerminado = !newState.is_active;
                    actualizarVista();
                    
                    if (newState.winner === 'empate') {
                        addLog(`🤝 Empate!`, "info");
                        estadoSpan.textContent = "🤝 ¡Empate! Reinicia.";
                    } else if (newState.winner) {
                        addLog(`🏆 Ganador: ${newState.winner}`, "success");
                        estadoSpan.textContent = `🏆 Ganó ${newState.winner}`;
                    } else {
                        if (miSimbolo === turnoActual && miSimbolo !== null) {
                            estadoSpan.textContent = "🎯 Tu turno";
                            addLog(`👉 Tu turno (${miSimbolo})`, "info");
                        } else if (miSimbolo !== null) {
                            estadoSpan.textContent = `Turno de ${turnoActual}`;
                            addLog(`👀 Turno de ${turnoActual}`, "info");
                        } else {
                            estadoSpan.textContent = "Espectador";
                        }
                    }
                }
            )
            .subscribe((status) => {
                addLog(`🔌 Suscripción Realtime: ${status}`, status === 'SUBSCRIBED' ? "success" : "info");
            });
    }

    // --- Inicialización ---
    crearTableroVisual();
    iniciarSincronizacion().catch(err => {
        addLog(`💥 Error fatal: ${err.message}`, "error");
    });
    botonReiniciar.addEventListener("click", reiniciarPartida);
</script>
</body>
</html>
