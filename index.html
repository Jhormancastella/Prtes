<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tres en Línea - Multijugador 1v1</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: system-ui, 'Segoe UI', monospace;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 { color: #facc15; text-align: center; margin-top: 0; font-size: 1.8rem; }
        .tablero {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #2d3a4a;
            padding: 16px;
            border-radius: 1.5rem;
            margin: 10px 0;
        }
        .celda {
            background: #0f172a;
            border-radius: 1rem;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #facc15;
            cursor: pointer;
            transition: 0.1s ease;            box-shadow: 0 5px 0 #00000033;
        }
        .celda:active { transform: scale(0.96); }
        .celda.x { color: #f87171; }
        .celda.o { color: #60a5fa; }
        .estado {
            text-align: center;
            margin: 15px 0 10px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #00000066;
            padding: 8px;
            border-radius: 60px;
            color: #facc15;
        }
        button {
            background: #facc15;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
            color: #0f172a;
            margin: 8px 0;
        }
        button:active { transform: scale(0.97); }
        .logs-area {
            background: #0a0f1a;
            color: #a5f3c3;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 8px;
            border-radius: 16px;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #facc1533;
        }
        .log-entry { border-bottom: 1px solid #334155; padding: 4px; word-break: break-word; }
        .log-error { color: #ffa6a6; background: #7f1a1a33; }
        .log-success { color: #b9ffb9; }
        .footer { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ TRES EN LÍNEA 1vs1</h1>    <div class="estado" id="estado">🔄 Conectando...</div>
    <div class="tablero" id="tablero"></div>
    <button id="reiniciar">🔄 Reiniciar partida</button>
    <div class="footer">🎮 Solo dos jugadores - Tiempo real con Supabase</div>
    <div class="logs-area" id="logsPanel"><div class="log-entry">📡 Iniciando juego...</div></div>
</div>

<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // ===== CONFIGURACIÓN =====
    const supabaseUrl = 'https://vkylxedxgcxrxfezmaau.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZreWx4ZWR4Z2N4cnhmZXptYWF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Mjg1NTcsImV4cCI6MjA5MjEwNDU1N30.QLAB88lwIAwc0IZ2bOwF8cw3QBkcidW9zac7LCvaMiw';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);
    const GAME_ID = 1;

    // Estado del juego
    let miSimbolo = null;
    let turnoActual = 'X';
    let juegoTerminado = false;
    let tableroLocal = ["", "", "", "", "", "", "", "", ""];
    
    // Elementos DOM
    const tableroDiv = document.getElementById("tablero");
    const estadoSpan = document.getElementById("estado");
    const botonReiniciar = document.getElementById("reiniciar");
    const logsPanel = document.getElementById("logsPanel");

    // Logs en pantalla
    function addLog(mensaje, tipo = "info") {
        const logDiv = document.createElement("div");
        logDiv.classList.add("log-entry");
        if (tipo === "error") logDiv.classList.add("log-error");
        if (tipo === "success") logDiv.classList.add("log-success");
        logDiv.textContent = `[${new Date().toLocaleTimeString()}] ${mensaje}`;
        logsPanel.appendChild(logDiv);
        logsPanel.scrollTop = logsPanel.scrollHeight;
        console.log(mensaje);
    }

    // Crear tablero visual
    function crearTableroVisual() {
        tableroDiv.innerHTML = "";
        for (let i = 0; i < 9; i++) {
            const celda = document.createElement("div");
            celda.classList.add("celda");
            celda.dataset.index = i;
            celda.textContent = "";
            celda.addEventListener("click", () => hacerMovimiento(i));
            tableroDiv.appendChild(celda);        }
        addLog("✅ Tablero visual creado", "success");
    }

    // Actualizar vista del tablero
    function actualizarVista() {
        const celdas = document.querySelectorAll(".celda");
        if (celdas.length !== 9) return;
        for (let i = 0; i < 9; i++) {
            celdas[i].textContent = tableroLocal[i];
            celdas[i].classList.remove('x', 'o');
            if (tableroLocal[i] === 'X') celdas[i].classList.add('x');
            if (tableroLocal[i] === 'O') celdas[i].classList.add('o');
        }
    }

    // Verificar ganador
    function verificarGanador(board) {
        const lineas = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        for (let linea of lineas) {
            const [a,b,c] = linea;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
        }
        if (board.every(cell => cell !== "")) return "empate";
        return null;
    }

    // Actualizar estado en pantalla
    function actualizarEstado(ganador = null) {
        if (ganador === 'empate') {
            estadoSpan.textContent = "🤝 ¡Empate! Reinicia.";
        } else if (ganador) {
            estadoSpan.textContent = `🏆 Ganó ${ganador}`;
        } else if (miSimbolo === null) {
            estadoSpan.textContent = "👀 Espectador";
        } else if (miSimbolo === turnoActual) {
            estadoSpan.textContent = "🎯 Tu turno";
        } else {
            estadoSpan.textContent = `⏳ Turno de ${turnoActual}`;
        }
    }

    // ✅ FUNCIÓN CORREGIDA: Asignación atómica de símbolos
    async function asignarSimbolo() {
        addLog("🔍 Asignando símbolo...", "info");
                const sessionId = Math.random().toString(36).substring(2, 15) + Date.now().toString(36);
        let asignado = false;
        let intentos = 0;
        const maxIntentos = 3;
        
        while (!asignado && intentos < maxIntentos) {
            intentos++;
            
            // Intentar obtener X primero (solo si x_player_id es NULL)
            const { data: updateX, error: errorX } = await supabase
                .from('juegos')
                .update({ x_player_id: sessionId })
                .eq('id', GAME_ID)
                .is('x_player_id', null);
                
            if (!errorX && updateX.length > 0) {
                // ✅ Logré asignarme como X
                miSimbolo = 'X';
                asignado = true;
                addLog(`🎮 Eres X (intento ${intentos})`, "success");
                continue;
            }
            
            // Si no pude obtener X, intentar obtener O (solo si o_player_id es NULL)
            const { data: updateO, error: errorO } = await supabase
                .from('juegos')
                .update({ o_player_id: sessionId })
                .eq('id', GAME_ID)
                .is('o_player_id', null);
                
            if (!errorO && updateO.length > 0) {
                // ✅ Logré asignarme como O
                miSimbolo = 'O';
                asignado = true;
                addLog(`🎮 Eres O (intento ${intentos})`, "success");
                continue;
            }
            
            // Si llegamos aquí, ambos están ocupados
            if (!errorX && !errorO) {
                miSimbolo = null;
                asignado = true;
                addLog(`👀 Partida llena. Modo espectador.`, "info");
            } else {
                // Error de red, esperar y reintentar
                addLog(`⚠️ Reintentando... (${intentos}/${maxIntentos})`, "info");
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }
                if (!asignado) {
            addLog(`❌ No se pudo unir a la partida`, "error");
            miSimbolo = null;
        }
        
        actualizarEstado();
    }

    // Verificar jugadores conectados
    function iniciarVerificacionJugadores() {
        setInterval(async () => {
            const { data: game } = await supabase
                .from('juegos')
                .select('x_player_id, o_player_id')
                .eq('id', GAME_ID)
                .single();
                
            if (game) {
                const jugadorX = game.x_player_id ? '🟢' : '⚪';
                const jugadorO = game.o_player_id ? '🟢' : '⚪';
                addLog(`👥 Jugadores: X ${jugadorX} | O ${jugadorO}`, "info");
            }
        }, 5000);
    }

    // Enviar movimiento a Supabase
    async function hacerMovimiento(indice) {
        if (juegoTerminado) {
            addLog("⛔ Partida terminada. Reinicia.", "error");
            return;
        }
        if (miSimbolo !== turnoActual) {
            addLog(`🙅 No es tu turno`, "error");
            return;
        }
        if (tableroLocal[indice] !== "") {
            addLog("❌ Casilla ocupada", "error");
            return;
        }

        // Actualizar localmente primero
        tableroLocal[indice] = miSimbolo;
        actualizarVista();
        
        const ganador = verificarGanador(tableroLocal);
        let siguienteTurno = (turnoActual === 'X') ? 'O' : 'X';
        let activo = true;
        
        if (ganador) {
            siguienteTurno = null;            activo = false;
            juegoTerminado = true;
            addLog(`🏆 ${ganador} ha ganado!`, "success");
        } else {
            turnoActual = siguienteTurno;
        }
        
        actualizarEstado(ganador);

        addLog(`📤 Enviando ${miSimbolo} en casilla ${indice}`, "info");
        
        const { error } = await supabase
            .from('juegos')
            .update({
                board: tableroLocal,
                current_turn: siguienteTurno,
                winner: ganador,
                is_active: activo
            })
            .eq('id', GAME_ID);

        if (error) {
            addLog(`❌ Error: ${error.message}`, "error");
            estadoSpan.textContent = "❌ Error de red";
        } else {
            addLog(`✅ Movimiento guardado`, "success");
        }
    }

    // Reiniciar partida
    async function reiniciarPartida() {
        addLog("♻️ Reiniciando...", "info");
        tableroLocal = ["", "", "", "", "", "", "", "", ""];
        turnoActual = 'X';
        juegoTerminado = false;
        actualizarVista();
        
        const { error } = await supabase
            .from('juegos')
            .update({
                board: tableroLocal,
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,
                o_player_id: null
            })
            .eq('id', GAME_ID);
            
        if (error) {            addLog(`Error reinicio: ${error.message}`, "error");
        } else {
            addLog(`♻️ Reinicio enviado`, "success");
            await asignarSimbolo();
        }
    }

    // Inicializar sincronización en tiempo real
    async function iniciarSincronizacion() {
        addLog("🚀 Inicializando...", "info");
        
        // Asegurar partida existente
        const { error: upsertError } = await supabase
            .from('juegos')
            .upsert({
                id: GAME_ID,
                board: ["","","","","","","","",""],
                current_turn: 'X',
                winner: null,
                is_active: true,
                x_player_id: null,
                o_player_id: null
            }, { onConflict: 'id' });
            
        if (upsertError) {
            addLog(`⚠️ Upsert: ${upsertError.message}`, "error");
        }
        
        await asignarSimbolo();
        iniciarVerificacionJugadores();
        
        // Cargar estado actual
        const { data: currentGame, error: loadError } = await supabase
            .from('juegos')
            .select('*')
            .eq('id', GAME_ID)
            .single();
            
        if (!loadError && currentGame) {
            tableroLocal = currentGame.board || ["","","","","","","","",""];
            turnoActual = currentGame.current_turn || 'X';
            juegoTerminado = !currentGame.is_active;
            actualizarVista();
            actualizarEstado(currentGame.winner);
            addLog(`📥 Estado cargado. Turno: ${turnoActual}`, "success");
        }
        
        // Suscribirse a cambios en tiempo real
        const channel = supabase
            .channel('juego-channel')            .on('postgres_changes', {
                event: 'UPDATE',
                schema: 'public',
                table: 'juegos',
                filter: `id=eq.${GAME_ID}`
            }, (payload) => {
                addLog(`📡 Cambio recibido`, "success");
                const newState = payload.new;
                
                tableroLocal = newState.board;
                turnoActual = newState.current_turn;
                juegoTerminado = !newState.is_active;
                
                actualizarVista();
                actualizarEstado(newState.winner);
            })
            .subscribe((status) => {
                addLog(`🔌 Realtime: ${status}`, status === 'SUBSCRIBED' ? "success" : "info");
            });
    }

    // Arrancar el juego
    crearTableroVisual();
    iniciarSincronizacion().catch(err => addLog(`💥 Error: ${err.message}`, "error"));
    botonReiniciar.addEventListener("click", reiniciarPartida);
</script>
</body>
</html>
